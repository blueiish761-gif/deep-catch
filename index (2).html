  18: {name:"龙虾盛宴节",     emoji:"🦞",color:"#ff6633",
       desc:"龙虾大丰收！海藻森林龙虾×6，龙虾全餐半价出售",

  20: {name:"海豚友谊日",     emoji:"🐬",color:"#00ccff",

  22: {name:"深海灯节",       emoji:"✨",color:"#ffaa00",
       desc:"生物发光节！所有深海区稀有鱼×4，水晶鱼必出现",

       specialMenu:{name:"鲸鱼传说宴席",price:25000,fish:"whale",desc:"一生一次的传说料理！"}},
  28: {name:"北极探索节",     emoji:"❄️",color:"#88eeff",
       desc:"北极水域大开放！格陵兰鲨和独角鲸大量出现",
       effect:{zone:"arctic",rareBoost:3.0,priceMult:1.4,bonusDays:2},
       specialFish:["polarshark","narwhal","beluga","arcticchar"]},
  30: {name:"深渊最终挑战",   emoji:"🐉",color:"#ff2222",
       desc:"月末大BOSS！深渊海龙必定出现，击杀奖励×3",
       effect:{zone:"abyss",guaranteedFish:"seadragon",killRewardMult:3,bonusDays:1}},
};

// Helper: get current month-day from game day
function getMonthDay(gameDay){ return ((gameDay-1)%30)+1; }
function getSeason(monthDay){
  return SEASONS.find(s=>monthDay>=s.days[0]&&monthDay<=s.days[1])||SEASONS[3];
}
function getFestival(monthDay){ return FESTIVALS[monthDay]||null; }
function getUpcomingFestivals(monthDay,count=3){
  const result=[];
  for(let i=1;i<=30&&result.length<count;i++){
    const d=((monthDay-1+i)%30)+1;
    if(FESTIVALS[d]) result.push({daysLeft:i,day:d,festival:FESTIVALS[d]});
  }
  return result;
}

const DEPTH_ORDER=["shallow","mid","deep"];
function getFish(z,d){ return Object.entries(FISH).filter(([,f])=>f.z===z&&f.d===d).map(([id,f])=>({...f,id})); }
function getEq(equip,type){ return EQUIP[type].find(e=>e.id===equip[type]); }
function starStr(n){ return "⭐".repeat(Math.min(5,n)); }

// ═══════════════════════════════════════════════════════
// MAIN GAME
// ═══════════════════════════════════════════════════════
function DeepCatch(){
  // ── core ──
  const [screen, setScreen]=useState("title");
  const [gold,   setGold]  =useState(3000);
  const [level,  setLevel] =useState(1);
  const [xp,     setXp]   =useState(0);
  const [inv,    setInv]   =useState({});
  const [equip,  setEquip] =useState({harpoon:"h1",gun:"g0",tank:"t1",suit:"s1",cargo:"c1"});
  const [ammo,   setAmmo]  =useState(0);
  const [staff,  setStaff] =useState([]);
  // ── time ──
  const [day,    setDay]   =useState(1);
  const [phase,  setPhase] =useState("day");
  const [dives,  setDives] =useState(0);
  const [dayEarn,setDayEarn]=useState(0);
  const [weather,setWeather]=useState(WEATHER[0]);
  // ── restaurant ──
  const [restLv,    setRestLv]    =useState(1);
  const [restXp,    setRestXp]    =useState(0);
  const [restUpgrades,setRestUpgrades]=useState([]);
  const [reputation,setReputation]=useState(50);  // 0-100
  const [rating,    setRating]    =useState(3.0);  // 1-5
  const [totalServed,setTotalServed]=useState(0);
  const [totalVipSat,setTotalVipSat]=useState(0);
  // ── restaurant live sim ──
  const [customers,    setCustomers]    =useState([]);  // active customers at tables
  const [cookQueue,    setCookQueue]    =useState([]);  // dishes being cooked
  const [restLog,      setRestLog]      =useState([]);
  const [tableCount,   setTableCount]   =useState(4);   // max tables
  const [nightServeCount,setNightServeCount]=useState(0);
  const [nightEarnings, setNightEarnings]=useState(0);

  const NIGHT_DURATION=45000; // 45秒夜晚营业时间
  // ── dive ──
  const [dive,    setDive]  =useState(null);
  const [fishTalk,setFishTalk]=useState(null);
  // ── UI ──
  const [tab,     setTab]   =useState("map");
  const [selZone, setSelZone]=useState("coral");
  const [gLog,    setGLog]  =useState(["🌊 欢迎来到深海捕手！8大水域，65种鱼类等你探索！"]);
  const [notif,   setNotif] =useState(null);
  // ── progress ──
  const [codex,   setCodex] =useState({});
  const [quests,  setQuests]=useState([]);
  const [qProg,   setQProg] =useState({});
  const [serveCount,setServeCount]=useState(0);
  // ── calendar / festival ──
  const [showCalendar, setShowCalendar]=useState(false);
  const [activeFestival, setActiveFestival]=useState(null);
  const [festivalMenu,   setFestivalMenu]  =useState(null);  // unlocked special dish
  const [abyssUnlocked,  setAbyssUnlocked] =useState(false); // temp unlock on festival day
  // ── AI ──
  const [aiHist,  setAiHist]=useState([]);
  const [aiIn,    setAiIn]  =useState("");
  const [aiLoad,  setAiLoad]=useState(false);

  const diveRef=useRef(null);
  diveRef.current=dive;
  const custRef=useRef(null);
  custRef.current=customers;
  const cookRef=useRef(null);
  cookRef.current=cookQueue;

  const addLog=m=>setGLog(p=>[m,...p].slice(0,80));
  const addRLog=m=>setRestLog(p=>[{msg:m,t:Date.now()},...p].slice(0,40));
  const notify=m=>{setNotif(m);setTimeout(()=>setNotif(null),2800);};

  const eq=t=>getEq(equip,t);
  const hasS=id=>staff.find(s=>s.id===id);
  const hasU=id=>restUpgrades.includes(id);

  // ── calendar helpers ──
  const monthDay   = getMonthDay(day);
  const curSeason  = getSeason(monthDay);
  const curFestival= getFestival(monthDay);
  const upcoming   = getUpcomingFestivals(monthDay);

  // festival effective catch modifier
  const festCatchBonus = curFestival?.effect?.catchAll||0;
  const festPriceMult  = curFestival?.effect?.priceMult||1.0;
  const festRestMult   = curFestival?.effect?.restMult||1.0;
  const seasonRestBonus= curSeason.restBonus||1.0;

  // unlock dishes based on restaurant level
  const availDishes=ALL_DISHES.filter(d=>d.unlockRest<=restLv);

  // ── init quests ──
  useEffect(()=>{
    if(!quests.length){
      setQuests(QUEST_POOL.slice(0,4).map(q=>({...q,done:false,progress:0})));
    }
  },[]);

  // ── XP ──
  const gainXp=amt=>{
    const mult=hasS("w5")?weather.xpMod*2:weather.xpMod;
    setXp(prev=>{
      const next=prev+Math.floor(amt*mult);
      const need=level*300;
      if(next>=need){setLevel(l=>{notify(`🎉 升级！Lv.${l+1}！`);return l+1;});return next-need;}
      return next;
    });
  };

  // ── quest update ──
  const updateQuest=(type,fishId,amount=1)=>{
    setQuests(qs=>qs.map(q=>{
      if(q.done) return q;
      let prog=q.progress||0;
      if(type==="fish"&&q.fish===fishId) prog+=amount;
      else if(type==="serve"&&q.type==="serve") prog+=amount;
      else if(type==="earn"&&q.type==="earn") prog+=amount;
      else if(type==="vip"&&q.type==="vip") prog+=amount;
      else return q;
      if(prog>=q.need){
        setGold(g=>g+q.reward); gainXp(q.xpR);
        notify(`✅ 任务完成！${q.desc} +¥${q.reward}`);
        return {...q,done:true,progress:q.need};
      }
      return {...q,progress:prog};
    }));
  };


  // ── SURFACE REF (氧气不再自动消耗，改为换区域/被攻击时扣除) ──
  const surfaceRef=useRef(null);
  useEffect(()=>{surfaceRef.current=doSurface;});


  // ── RESTAURANT live tick: customer patience & cook timer ──
  useEffect(()=>{
    if(screen!=="main"||phase!=="night") return;
    const t=setInterval(()=>{
      const now=Date.now();
      // cook queue: finish dishes
      setCookQueue(prev=>{
        const done=[];
        const remaining=prev.filter(item=>{
          if(now>=item.finishAt){done.push(item);return false;}
          return true;
        });
        if(done.length){
          done.forEach(item=>{
            // give dish to customer
            setCustomers(cs=>cs.map(c=>{
              if(c.uid===item.custUid&&c.status==="waiting"){
                addRLog(`🍱 ${item.dishName} 上桌！→ ${c.name}`);
                return {...c,status:"eating",eatFinishAt:now+15000,satisfied:true};
              }
              return c;
            }));
          });
        }
        return remaining;
      });
      // customers: check if patience expired or eating done
      setCustomers(prev=>{
        return prev.map(c=>{
          if(c.status==="waiting"&&now>c.patienceEnd){
            addRLog(`😤 ${c.name}(${c.customerEmoji})等太久离开了！-声誉`);
            setReputation(r=>Math.max(0,r-3));
            return {...c,status:"left_angry",leaveAt:now};
          }
          if(c.status==="eating"&&now>c.eatFinishAt){
            // pay and leave
            const tipMult=hasS("w3")?1.15:1.0;
            const priceMult=(hasS("w2")?1.20:1.0)*(hasU("r1")?1.15:1.0)*(hasU("r5")?1.20:1.0)*(hasS("w9")?1.10:1.0)*festRestMult*seasonRestBonus;
            const bill=Math.floor(c.bill*priceMult);
            const tip=Math.floor(bill*c.tipRate*tipMult);
            const total=bill+tip;
            setGold(g=>g+total);
            setDayEarn(e=>e+total);
            setNightEarnings(e=>e+total);
            setNightServeCount(n=>n+1);
            setTotalServed(n=>n+1);
            const satisfied=c.satisfied;
            setReputation(r=>Math.min(100,r+(satisfied?2:-1)));
            setRating(r=>{
              const score=satisfied?(c.customerType==="critic"?0.3:0.1):-0.05;
              return Math.min(5,Math.max(1,parseFloat((r+score).toFixed(1))));
            });
            if(c.customerType==="critic"&&satisfied){updateQuest("vip",null,1);}
            if(c.customerType==="vip"&&satisfied){setTotalVipSat(n=>n+1);updateQuest("vip",null,1);}
            addRLog(`✅ ${c.name} 结账 ¥${total}（含小费¥${tip}）${ satisfied?"😊":"😐"}`);
            updateQuest("earn",null,total);
            return {...c,status:"paid",leaveAt:now};
          }
          return c;
        }).filter(c=>c.status!=="paid"&&c.status!=="left_angry"||(now-(c.leaveAt||0))<3000);
      });
    },1000);
    return ()=>clearInterval(t);
  },[screen,phase,hasS,hasU,weather]);

  // ── spawn customers at night ──
  useEffect(()=>{
    if(screen!=="main"||phase!=="night") return;
    const spawnCustomer=()=>{
      const cs=custRef.current;
      const maxTables=tableCount+(hasU("r4")?2:0);
      if(cs.filter(c=>c.status==="waiting"||c.status==="eating").length>=maxTables) return;
      // pick customer type based on restaurant level & upgrades
      let pool=[...CUSTOMER_TYPES];
      if(restLv<3) pool=pool.filter(c=>c.prefer<=2);
      if(!hasU("r4")) pool=pool.filter(c=>c.type!=="vip");
      if(hasU("r6")) pool=[...pool,...CUSTOMER_TYPES.filter(c=>c.type==="foodie")]; // extra foodie
      const custMod=weather.custMod;
      if(Math.random()>custMod) return; // weather reduces spawns
      const base=pool[Math.floor(Math.random()*pool.length)];
      const patience=(base.patience+(hasU("r3")?20:0))*1000;
      const now=Date.now();
      const newCust={
        uid:`c${Math.random()}`,
        customerType:base.type,
        name:base.name,
        customerEmoji:base.emoji,
        status:"waiting",
        patienceEnd:now+patience,
        patienceMs:patience,
        bill:0,
        tipRate:base.tip+(hasS("w3")?0.05:0),
        prefer:base.prefer,
        spendMult:base.spendMult,
        satisfied:false,
        arrivedAt:now,
      };
      setCustomers(p=>[...p,newCust]);
      addRLog(`🚶 ${base.emoji}${base.name}进门了！`);
    };
    const interval=hasU("r8")?1200:2000;
    const t=setInterval(spawnCustomer,interval+(Math.random()*3000));
    return ()=>clearInterval(t);
  },[screen,phase,restLv,hasU,hasS,tableCount,weather]);


  // ── AUTO END NIGHT ──
  useEffect(()=>{
    if(screen!=="main"||phase!=="night") return;
    const timer=setTimeout(()=>{
      addLog("🌙 营业时间结束，自动进入新一天！");
      doSurface();
    }, NIGHT_DURATION);
    return ()=>clearTimeout(timer);
  },[screen,phase,day]);

  // ── AUTO SKIP NIGHT WHEN SOLD OUT ──
  useEffect(()=>{
    if(screen!=="main"||phase!=="night") return;
    const totalStock=availDishes.reduce((sum,d)=>sum+(inv[d.fishId]||0),0);
    const activeCustomers=customers.filter(c=>c.status==="waiting"||c.status==="eating").length;
    const activeCooking=cookQueue.length;

    if(totalStock<=0 && activeCustomers===0 && activeCooking===0){
      setTimeout(()=>{
        addLog("🍽️ 食材已全部卖完，自动跳过夜晚！");
        doSurface();
      },1000);
    }
  },[screen,phase,inv,customers,cookQueue]);

  // ── SERVE DISH to customer ──
  const serveDish=(custUid, dish)=>{
    const cust=customers.find(c=>c.uid===custUid);
    if(!cust||cust.status!=="waiting") return;
    if((inv[dish.fishId]||0)<=0){notify(`❌ 没有 ${dish.fishName}！`);return;}
    const cookMult=hasU("r7")?0.6:1.0;
    const cookMs=Math.floor(dish.cookTime*1000*cookMult*(hasS("w1")?0.80:1.0));
    const bill=Math.floor(dish.basePrice*cust.spendMult);
    setInv(p=>({...p,[dish.fishId]:p[dish.fishId]-1}));
    const now=Date.now();
    setCookQueue(p=>[...p,{
      uid:`cook${Math.random()}`,
      custUid,
      dishName:dish.name,
      fishId:dish.fishId,
      startAt:now,
      finishAt:now+cookMs,
      cookMs,
    }]);
    setCustomers(p=>p.map(c=>c.uid===custUid?{...c,bill,orderedDish:dish.name,status:"waiting"}:c));
  };

  // ── START DIVE ──
  const startDive=(zoneId,depth)=>{
    if(phase!=="day"){addLog("🌙 夜晚请经营餐厅！");return;}
    if(dives>=2){addLog("😴 今天已潜水2次！");return;}
    const s=eq("suit");
    if(!s.zones.includes(zoneId)){addLog("🤿 潜水服无法进入此水域！");return;}
    if(DEPTH_ORDER.indexOf(depth)>DEPTH_ORDER.indexOf(s.maxD)){addLog("🤿 潜水服深度不足！");return;}
    // festival abyss unlock
    if(zoneId==="abyss"&&!eq("suit").zones.includes("abyss")&&!abyssUnlocked){
      addLog("🔒 深渊需要神话深海甲才能进入！（等待深渊节解锁）");return;
    }
    const pool=getFish(zoneId,depth);
    if(!pool.length){addLog("该区域暂无鱼类");return;}
    const extra=weather.id==="fog"?2:0;
    const biolum=weather.id==="biolum"||curFestival?.effect?.rareBoostDeep>1;
    // festival guaranteed fish injection
    const guaranteedId=curFestival?.effect?.guaranteedFish;
    const festZoneBoost=curFestival?.effect?.zone===zoneId;
    const festFishBoost=curFestival?.effect?.fishBoost;
    const festBoostMult=curFestival?.effect?.boostMult||1;
    const count=Math.floor(Math.random()*3)+4+extra+(festZoneBoost?2:0);
    const list=Array.from({length:count},()=>{
      const rareChance=biolum?0.35:curFestival?.effect?.rareBoost?0.30:0.15;
      const candidates=pool.filter(f=>f.v>0||f.prot);
      let f;
      // festival fish boost: if this zone has a boosted fish, increase its appearance
      if(festFishBoost&&Math.random()<Math.min(0.9,(festBoostMult-1)*0.15)){
        const boostedPool=pool.filter(x=>x.id===festFishBoost);
        if(boostedPool.length){f=boostedPool[0];}
      }
      if(!f){
        if(Math.random()<rareChance){const r=candidates.filter(x=>x.rare);f=r.length?r[Math.floor(Math.random()*r.length)]:candidates[Math.floor(Math.random()*candidates.length)];}
        else{const c=candidates.filter(x=>!x.rare);f=c.length?c[Math.floor(Math.random()*c.length)]:candidates[Math.floor(Math.random()*candidates.length)];}
      }
      return {...f,curHp:f.hp,caught:false,fled:false,uid:`${Math.random()}`};
    });
    // inject guaranteed festival fish if in correct zone
    if(guaranteedId&&FISH[guaranteedId]&&(curFestival?.effect?.zone===zoneId||!curFestival?.effect?.zone)){
      const gf=FISH[guaranteedId];
      if(gf.z===zoneId||!gf.z){
        list.push({...gf,id:guaranteedId,curHp:gf.hp,caught:false,fled:false,uid:`guaranteed-${Math.random()}`});
        addLog(`✨ 节日效果：${gf.e}${gf.n} 出现了！`);
      }
    }
    const baseHp=100+(s.id==="s4"?20:0);
    setAmmo(eq("gun").ammo||0);
    setDive({zone:zoneId,depth,fish:list,o2:eq("tank").o2,maxO2:eq("tank").o2,hp:baseHp,maxHp:baseHp,cargo:0,maxCargo:eq("cargo").cap,caughtMap:{},dlog:[`🤿 进入${ZONES[zoneId].name}·${depth==="shallow"?"浅海":depth==="mid"?"中层":"深海"}，发现${count}种生物！`]});
    setScreen("dive");
  };

  const doSurface=ds=>{
    const s=ds||diveRef.current;
    if(!s) return;
    const cm=s.caughtMap;
    const newInv={...inv};
    let totalVal=0;
    const festMult=festPriceMult||1.0;
    const killMult=curFestival?.effect?.killRewardMult||1;
    Object.entries(cm).forEach(([id,n])=>{
      const f=FISH[id];
      if(!f||f.prot||f.v===0) return;
      newInv[id]=(newInv[id]||0)+n;
      totalVal+=Math.floor(f.v*n*festMult);
    });
    setInv(newInv);
    setCodex(prev=>{const next={...prev};Object.entries(cm).forEach(([id,n])=>{next[id]=(next[id]||0)+n;});return next;});
    const total=Object.values(cm).reduce((a,b)=>a+b,0);
    addLog(`🏖️ 上岸！捕获${total}条，估值¥${totalVal.toLocaleString()}`);
    setDives(p=>p+1);setDive(null);setScreen("main");setTab("map");
  };

  const catchFish=async fish=>{
    if(!dive||fish.caught||fish.fled) return;
    if(fish.prot||fish.v===0){
      setDive(p=>({...p,dlog:[`📷 ${fish.n}是保护动物！拍照 +${fish.xp}XP`,...p.dlog],fish:p.fish.map(f=>f.uid===fish.uid?{...f,caught:true}:f),caughtMap:{...p.caughtMap,[fish.id]:(p.caughtMap[fish.id]||0)+1}}));
      gainXp(fish.xp);updateQuest("fish",fish.id,1);return;
    }
    if(dive.cargo+fish.w>dive.maxCargo){setDive(p=>({...p,dlog:[`📦 装载箱满！${fish.n}放不下`,...p.dlog]}));return;}
    if(fish.ag&&!aiLoad){
      setAiLoad(true);
      fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:60,system:`你是深海游戏里凶猛的${fish.n}(HP:${fish.curHp}/${fish.hp})。玩家来抓你。一句话第一人称野性反击（中文不超过18字）。`,messages:[{role:"user",content:"玩家靠近！"}]})})
        .then(r=>r.json()).then(d=>{setFishTalk(`${fish.e} ${fish.n}：${d.content?.[0]?.text||""}`);setTimeout(()=>setFishTalk(null),3500);})
        .catch(()=>{}).finally(()=>setAiLoad(false));
    }
    const catchBonus=hasS("w7")?0.08:0;
    const rate=Math.min(0.99,eq("harpoon").rate+weather.catchMod+catchBonus+festCatchBonus);
    const ok=Math.random()<rate;
    const defMult=hasS("w6")?0.7:1.0;
    const logs=[];
    if(ok){
      const nm={...dive.caughtMap,[fish.id]:(dive.caughtMap[fish.id]||0)+1};
      logs.push(`✅ 捕获${fish.n}(${fish.w}kg) +${fish.xp}XP`);
      if(festPriceMult>1) logs.push(`🎉 节日加成·价值×${festPriceMult}！`);
      setDive(p=>({...p,fish:p.fish.map(f=>f.uid===fish.uid?{...f,caught:true}:f),caughtMap:nm,cargo:p.cargo+fish.w,dlog:[...logs,...p.dlog]}));
      gainXp(fish.xp);updateQuest("fish",fish.id,1);
    } else {
      // 捕捉失败：有攻击性的鱼会反击，扣除氧气（不扣HP）
      if(fish.ag){
        const o2dmg=Math.floor(fish.dmg*defMult*2+Math.random()*8); // 攻击转化为氧气消耗
        const hpdmg=Math.floor(fish.dmg*defMult*0.5); // 少量HP也扣
        logs.push(`💥 ${fish.n}反击！消耗${o2dmg}氧气 -${hpdmg}HP`);
        setDive(p=>{
          const newO2=Math.max(0,p.o2-o2dmg);
          const newHp=Math.max(0,p.hp-hpdmg);
          const fled={...p,fish:p.fish.map(f=>f.uid===fish.uid?{...f,fled:true}:f),o2:newO2,hp:newHp,dlog:[...logs,...p.dlog]};
          if(newO2<=0){
            addLog("💀 氧气耗尽！紧急上浮！");
            setTimeout(()=>{if(surfaceRef.current) surfaceRef.current(fled);},100);
          }
          return fled;
        });
      } else {
        logs.push(`❌ ${fish.n}逃脱了！`);
        setDive(p=>({...p,fish:p.fish.map(f=>f.uid===fish.uid?{...f,fled:true}:f),dlog:[...logs,...p.dlog]}));
      }
    }
  };

  const shootFish=fish=>{
    if(!dive||fish.caught||fish.fled||fish.prot) return;
    const gun=eq("gun");
    if(gun.id==="g0"||ammo<=0){addLog("⚠️ 没有弹药！");return;}
    const dmg=gun.dmg+Math.floor(Math.random()*20);
    const newHp=fish.curHp-dmg;
    const newAmmo=ammo-1;setAmmo(newAmmo);
    if(newHp<=0){
      if(dive.cargo+fish.w>dive.maxCargo){setDive(p=>({...p,dlog:[`📦 箱满，${fish.n}尸体无法装入`,...p.dlog]}));return;}
      const nm={...dive.caughtMap,[fish.id]:(dive.caughtMap[fish.id]||0)+1};
      setDive(p=>({...p,fish:p.fish.map(f=>f.uid===fish.uid?{...f,caught:true,curHp:0}:f),caughtMap:nm,cargo:p.cargo+fish.w,dlog:[`💀 击杀${fish.n}！+${fish.xp*2}XP 弹药剩${newAmmo}`,...p.dlog]}));
      gainXp(fish.xp*2);updateQuest("fish",fish.id,1);
    } else {
      setDive(p=>({...p,fish:p.fish.map(f=>f.uid===fish.uid?{...f,curHp:newHp}:f),dlog:[`🔫 射击${fish.n} -${dmg}HP (${newHp}/${fish.hp}) 弹药剩${newAmmo}`,...p.dlog]}));
    }

  const useSupply=()=>{
    if(!dive) return;

    const cost=Math.floor(z.cost*disc);
    if(gold<cost){setDive(p=>({...p,dlog:[`💸 金币不足¥${cost}`,...p.dlog]}));return;}
    setGold(p=>p-cost);
    setDive(p=>({...p,o2:Math.min(p.maxO2,p.o2+z.supplyO2),hp:Math.min(p.maxHp,p.hp+z.supplyHp),dlog:[`⛽ 补给！+${z.supplyO2}氧 +${z.supplyHp}HP -¥${cost}`,...p.dlog]}));
  };
  // ── 换区域（替换冲刺）──
  const switchArea=()=>{
    if(!dive) return;
    const O2_COST=10;
    if(dive.o2<O2_COST){
      setDive(p=>({...p,dlog:[`⚠️ 氧气不足${O2_COST}，无法换区！`,...p.dlog]}));
      return;
    }
    const z=ZONES[dive.zone];
    const pool=getFish(dive.zone,dive.depth);
    if(!pool.length){setDive(p=>({...p,dlog:["❌ 该深度没有其他鱼类区域",...p.dlog]}));return;}
    // 生成全新一批鱼，旧鱼标记为 fled
    const biolum=weather.id==="biolum"||curFestival?.effect?.rareBoostDeep>1;
    const festZoneBoost=curFestival?.effect?.zone===dive.zone;
    const festFishBoost=curFestival?.effect?.fishBoost;
    const festBoostMult=curFestival?.effect?.boostMult||1;
    const count=Math.floor(Math.random()*3)+3+(festZoneBoost?2:0);
    const newFish=Array.from({length:count},()=>{
      const rareChance=biolum?0.35:curFestival?.effect?.rareBoost?0.30:0.15;
      const candidates=pool.filter(f=>f.v>0||f.prot);
      let f;
      if(festFishBoost&&Math.random()<Math.min(0.9,(festBoostMult-1)*0.15)){
        const bp=pool.filter(x=>x.id===festFishBoost);
        if(bp.length) f=bp[0];
      }
      if(!f){
        if(Math.random()<rareChance){const r=candidates.filter(x=>x.rare);f=r.length?r[Math.floor(Math.random()*r.length)]:candidates[Math.floor(Math.random()*candidates.length)];}
        else{const c=candidates.filter(x=>!x.rare);f=c.length?c[Math.floor(Math.random()*c.length)]:candidates[Math.floor(Math.random()*candidates.length)];}
      }
      return {...f,curHp:f.hp,caught:false,fled:false,uid:`sw${Math.random()}`};
    });
    // 检查节日保底鱼
    const guaranteedId=curFestival?.effect?.guaranteedFish;
    if(guaranteedId&&FISH[guaranteedId]&&(curFestival?.effect?.zone===dive.zone||!curFestival?.effect?.zone)){
      const gf=FISH[guaranteedId];
      if(gf.z===dive.zone||!gf.z){
        newFish.push({...gf,id:guaranteedId,curHp:gf.hp,caught:false,fled:false,uid:`guar${Math.random()}`});
      }
    }
    setDive(p=>({
      ...p,
      fish:[
        ...p.fish.map(f=>(!f.caught&&!f.fled)?{...f,fled:true}:f), // 旧鱼全部标记为逃跑
        ...newFish
      ],
      o2:p.o2-O2_COST,
      dlog:[`🌊 换到新区域！发现${count}种新生物 -${O2_COST}氧气`,...p.dlog]
    }));
    notify(`🌊 换区成功！-${O2_COST}氧气`);
  };

装备：${eq("harpoon").name}·${eq("suit").name}·${eq("tank").name}·${eq("cargo").name}·${eq("gun").id!=="g0"?eq("gun").name+"×"+ammo:"无枪"}
库存：${invStr} 已发现:${Object.keys(codex).length}/${Object.keys(FISH).length}种
活泼简短给出策略（120字内）。`;

  };

  const totalInv=Object.values(inv).reduce((a,b)=>a+b,0);
  const codexCount=Object.keys(codex).length;

  // ══════════════════ TITLE ══════════════════
  if(screen==="title") return (
    <div style={{minHeight:"100vh",background:"linear-gradient(180deg,#000c18,#001428,#002240)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#ddeeff",padding:24,overflow:"hidden",position:"relative"}}>
      {[...Array(20)].map((_,i)=>(
        <div key={i} style={{position:"absolute",bottom:-16,left:`${(i*5)%100}%`,width:4+(i%6)*5,height:4+(i%6)*5,borderRadius:"50%",background:"rgba(80,180,255,.1)",animation:`bub ${2.2+i*0.35}s ease-in ${i*0.28}s infinite`}}/>

      <div style={{fontSize:42,fontWeight:900,letterSpacing:5,background:"linear-gradient(135deg,#00d4ff,#fff,#7fffd4)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:4}}>深海捕手</div>
      <div style={{fontSize:11,letterSpacing:6,color:"#4a9ab8",marginBottom:6}}>DEEP CATCH</div>

      <div style={{display:"flex",gap:8,marginBottom:40,flexWrap:"wrap",justifyContent:"center"}}>
        {["🪸珊瑚礁","🌿海藻林","🌊大洋","🌋火山","❄️北极","⚓沉船","🌴红树林","🕳️深渊"].map((z,i)=>(
          <div key={i} style={{fontSize:10,color:"#2a5a70"}}>{z}</div>
        ))}
      </div>
      <button onClick={()=>{setScreen("main");setTab("map");rollWeather();}} style={{padding:"14px 56px",fontSize:18,fontWeight:700,border:"2px solid #00d4ff",background:"rgba(0,100,160,0.22)",color:"#00d4ff",borderRadius:50,cursor:"pointer",letterSpacing:3,backdropFilter:"blur(10px)",boxShadow:"0 0 35px rgba(0,212,255,.4)",animation:"rise .8s ease .3s both"}}>
        开始冒险
      </button>
    </div>

  // ══════════════════ DIVE ══════════════════
  if(screen==="dive"&&dive){

    const hpp=(dive.hp/dive.maxHp)*100;
    const cp=(dive.cargo/dive.maxCargo)*100;

      if(f.caught||f.fled) return "none";

        {[...Array(10)].map((_,i)=>(
          <div key={i} style={{position:"fixed",left:`${8+i*9}%`,bottom:0,width:3+(i%4)*3,height:3+(i%4)*3,borderRadius:"50%",background:"rgba(100,200,255,.18)",animation:`bubbleUp ${2.5+i*0.6}s ease-in ${i*0.7}s infinite`,pointerEvents:"none",zIndex:0}}/>
        ))}

        {/* 背景扫描线（深海感） */}
        {dive.depth==="deep"&&(
          <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,backgroundImage:"repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(0,100,180,.04) 18px,rgba(0,100,180,.04) 20px)",pointerEvents:"none",zIndex:0}}/>
        )}

        <div style={{position:"relative",zIndex:1}}>

        {/* HUD */}
        <div style={{background:"rgba(0,0,0,.75)",borderRadius:14,padding:"10px 14px",marginBottom:10,border:`1px solid ${o2p<25?"rgba(255,50,50,.5)":"rgba(255,255,255,.07)"}`,transition:"border-color .5s",backdropFilter:"blur(6px)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:z.color}}>{z.emoji} {z.name}</div>
              <div style={{fontSize:9,color:"rgba(150,200,220,.7)"}}>{depthLabel} · {weather.emoji}{weather.name}</div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {eq("gun").id!=="g0"&&(
                <div style={{fontSize:10,color:"#ff8855",background:"rgba(200,80,0,.2)",borderRadius:6,padding:"2px 7px",border:"1px solid rgba(200,80,0,.4)"}}>

        {fishTalk&&(
          <div style={{background:"linear-gradient(135deg,rgba(180,20,20,.35),rgba(100,0,0,.4))",border:"1px solid #ff5533",borderRadius:12,padding:"10px 14px",marginBottom:10,fontSize:13,color:"#ffcccc",animation:"pop .25s ease,shake .3s ease",backdropFilter:"blur(4px)"}}>
            {fishTalk}

            {notif}

        {/* 节日效果提示 */}

          <div style={{background:`${curFestival.color}18`,border:`1px solid ${curFestival.color}44`,borderRadius:8,padding:"4px 10px",marginBottom:8,fontSize:10,color:curFestival.color,animation:"pulse 2s infinite"}}>

            const done=fish.caught||fish.fled;

            const hpPct=(fish.curHp/fish.hp)*100;

                {/* 稀有光晕背景 */}
                {fish.rare&&!done&&(
                  <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:"radial-gradient(ellipse at 50% 20%,rgba(255,215,0,.08),transparent 70%)",borderRadius:13,pointerEvents:"none"}}/>
                )}
                {boss&&!done&&(
                  <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:"radial-gradient(ellipse at 50% 30%,rgba(255,30,0,.12),transparent 70%)",borderRadius:13,pointerEvents:"none"}}/>
                )}

                {/* 鱼 emoji + 角标 */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <div style={{position:"relative"}}>
                    <span style={{fontSize:fishSize(fish),display:"block",animation:fishAnim(fish),lineHeight:1.1}}>{fish.e}</span>
                    {boss&&!done&&<div style={{position:"absolute",top:-4,left:-2,fontSize:8,color:"#ff4400",fontWeight:900,textShadow:"0 0 4px #ff2200"}}>BOSS</div>}
                    {fish.rare&&!done&&<div style={{position:"absolute",bottom:-2,right:-2,fontSize:9}}>✨</div>}
                    {prot&&!done&&<div style={{position:"absolute",bottom:-2,right:-2,fontSize:9}}>🛡️</div>}
                  </div>
                  <div style={{textAlign:"right",flex:1,paddingLeft:6}}>
                    <div style={{fontSize:11,fontWeight:700,color:boss?"#ff8844":prot?"#44cc88":fish.rare?"#ffd700":"#cce8ff",lineHeight:1.2}}>
                      {fish.n}
                    </div>
                    <div style={{fontSize:8,color:"#4a6a88",marginTop:1}}>{prot?"🛡 保护动物":`${fish.w}kg · ¥${fish.v}`}</div>
                    {!done&&!prot&&<div style={{fontSize:8,color:"#3a5a88",marginTop:1}}>{"⭐".repeat(fish.q)} 品质</div>}
                  </div>
                </div>

                {/* HP 条 */}
                {!done&&!prot&&(
                  <div style={{marginBottom:5}}>
                    <div style={{height:4,background:"rgba(0,0,0,.5)",borderRadius:2,overflow:"hidden"}}>
                      <div style={{width:`${hpPct}%`,height:"100%",background:hpPct<30?"#ff3333":hpPct<60?"#ffaa00":fish.ag?"#ff5588":"#3399ff",borderRadius:2,transition:"width .3s",boxShadow:fish.ag&&hpPct>50?"0 0 4px rgba(255,50,100,.6)":"none"}}/>
                    </div>
                    <div style={{fontSize:8,color:"#2a4a68",textAlign:"right",marginTop:1}}>{fish.curHp}/{fish.hp}</div>
                  </div>
                )}

                {/* 描述 */}
                {!done&&(
                  <div style={{fontSize:9,color:prot?"#44cc88":fish.ag?"#ff9966":"#5a7a9a",marginBottom:7,lineHeight:1.4}}>{fish.desc}</div>
                )}

                {/* 按钮组 */}
                {!done&&(
                  <div style={{display:"flex",gap:5}}>
                    <button onClick={()=>catchFish(fish)} style={{flex:1,padding:"7px 0",fontSize:10,background:prot?"linear-gradient(135deg,rgba(0,150,60,.4),rgba(0,100,40,.3))":"linear-gradient(135deg,rgba(0,80,200,.4),rgba(0,50,150,.3))",border:`1px solid ${prot?"#33bb66":"#0055cc"}`,borderRadius:8,color:prot?"#55ee99":"#66aaff",cursor:"pointer",fontWeight:600,transition:"all .15s"}}>
                      {prot?"📷 拍照":"🔱 捕捉"}
                    </button>
                    {!prot&&eq("gun").id!=="g0"&&ammo>0&&(
                      <button onClick={()=>shootFish(fish)} style={{flex:1,padding:"7px 0",fontSize:10,background:"linear-gradient(135deg,rgba(200,50,0,.4),rgba(140,20,0,.3))",border:"1px solid #cc3300",borderRadius:8,color:"#ff8855",cursor:"pointer",fontWeight:600}}>
                        🔫 射击
                      </button>
                    )}
                  </div>
                )}

                {/* 完成状态 */}
                {fish.caught&&(
                  <div style={{textAlign:"center",fontSize:12,color:prot?"#44cc88":"#33ee77",fontWeight:700,padding:"4px 0",animation:"pop .3s ease"}}>
                    {prot?"📷 已拍照":"✅ 已捕获"}
                  </div>
                )}
                {fish.fled&&(
                  <div style={{textAlign:"center",fontSize:11,color:"#555",padding:"4px 0"}}>
                    💨 逃脱了
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* 操作按钮行 */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
          <button onClick={switchArea} disabled={dive.o2<10} style={{padding:"12px 0",fontSize:11,background:dive.o2<10?"rgba(30,30,30,.4)":"linear-gradient(135deg,rgba(0,180,140,.35),rgba(0,120,100,.25))",border:`1px solid ${dive.o2<10?"#222":"#00bbaa"}`,borderRadius:11,color:dive.o2<10?"#333":"#00eedd",cursor:dive.o2<10?"not-allowed":"pointer",fontWeight:600,transition:"all .2s"}}>
            🌊 换区域
            <div style={{fontSize:8,color:dive.o2<10?"#222":"rgba(0,230,200,.6)",marginTop:2}}>-10氧气</div>
          </button>
          <button onClick={useSupply} style={{padding:"12px 0",fontSize:11,background:"linear-gradient(135deg,rgba(220,130,0,.3),rgba(160,80,0,.2))",border:"1px solid #ddaa00",borderRadius:11,color:"#ffcc33",cursor:"pointer",fontWeight:600}}>
            ⛽ 补给站
            <div style={{fontSize:8,color:"rgba(255,190,0,.6)",marginTop:2}}>¥{Math.floor(ZONES[dive.zone].cost*(hasS("w4")?0.75:1))}</div>
          </button>
          <button onClick={()=>doSurface(null)} style={{padding:"12px 0",fontSize:11,background:"linear-gradient(135deg,rgba(40,190,50,.3),rgba(20,130,30,.2))",border:"1px solid #33bb33",borderRadius:11,color:"#66ee66",cursor:"pointer",fontWeight:600}}>
            🏖️ 上浮
            <div style={{fontSize:8,color:"rgba(80,220,80,.6)",marginTop:2}}>结束潜水</div>
          </button>
        </div>

        {/* 氧气说明提示 */}
        <div style={{background:"rgba(0,0,0,.35)",borderRadius:8,padding:"5px 10px",marginBottom:8,fontSize:9,color:"#2a5a78",display:"flex",gap:12,flexWrap:"wrap"}}>
          <span>💧 换区域 -10氧</span>
          <span>💥 被攻击性鱼反击 → 扣氧气</span>
          <span>⛽ 补给站回复氧气</span>
          <span style={{color:"#ff4444"}}>⚠️ 氧气归零自动上浮</span>
        </div>

        {/* 潜水日志 */}
        <div style={{background:"rgba(0,0,0,.5)",borderRadius:11,padding:10,maxHeight:110,overflowY:"auto",border:"1px solid rgba(0,40,80,.4)",backdropFilter:"blur(4px)"}}>
          <div style={{fontSize:9,color:"#2a4a68",marginBottom:4,letterSpacing:1}}>── 潜水日志 ──</div>
          {dive.dlog.map((l,i)=>(
            <div key={i} style={{fontSize:10,color:i===0?"#88bbdd":"#1e3a50",padding:"2px 0",borderBottom:"1px solid rgba(255,255,255,.02)",lineHeight:1.5}}>
              {l}
            </div>
          ))}
        </div>

        </div>{/* end zIndex wrapper */}
      </div>
    );
  }

  // ══════════════════ MAIN HUB ══════════════════
  const TABS=[
    {id:"map",        label:"🗺️ 地图"},
    {id:"calendar",   label:`📅 日历${curFestival?"🎉":""}`},
    {id:"inventory",  label:totalInv>0?`📦 库存(${totalInv})`:"📦 库存"},
    {id:"restaurant", label:"🍣 餐厅"},
    {id:"kitchen",    label:"👨‍🍳 厨房"},
    {id:"shop",       label:"🛒 商店"},
    {id:"quests",     label:"📋 任务"},
    {id:"codex",      label:"📖 图鉴"},
    {id:"ai",         label:"🤖 顾问"},
  ];

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(180deg,#000c18,#001220)",color:"#cce8ff",paddingBottom:68}}>
      {notif&&<div style={{position:"fixed",top:68,left:"50%",transform:"translateX(-50%)",background:"rgba(0,140,70,.92)",border:"1px solid #44cc88",borderRadius:12,padding:"9px 20px",fontSize:13,color:"#ccffdd",zIndex:999,animation:"pop .25s ease",whiteSpace:"nowrap",maxWidth:"80vw",textAlign:"center"}}>{notif}</div>}

      {/* Header */}
      <div style={{background:"rgba(0,10,25,.98)",padding:"10px 14px 7px",borderBottom:"1px solid rgba(0,90,160,.3)",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:15,fontWeight:900,letterSpacing:2,color:"#00d4ff"}}>🤿 深海捕手</div>
            <div style={{fontSize:9,color:"#1e4e6a"}}>Lv.{level} · 餐厅{restLv}★ · 第{day}天({monthDay}号) · {curSeason.emoji}{curSeason.name} · {weather.emoji}{weather.name} · ⭐{rating.toFixed(1)}</div>
            {curFestival&&<div style={{fontSize:9,color:curFestival.color,fontWeight:700,animation:"pulse 1.5s infinite"}}>{curFestival.emoji} 今日节日：{curFestival.name}</div>}
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:18,fontWeight:700,color:"#ffd700"}}>¥{gold.toLocaleString()}</div>
            <div style={{fontSize:9,padding:"2px 7px",borderRadius:18,marginTop:2,display:"inline-block",background:phase==="day"?"rgba(255,195,0,.18)":"rgba(80,55,200,.22)",border:`1px solid ${phase==="day"?"#ccbb00":"#6644dd"}`,color:phase==="day"?"#ffdd44":"#aa88ff"}}>
              {phase==="day"?`☀️ 白天 · 剩${2-dives}次`:"🌙 夜晚营业"}
            </div>
          </div>
        </div>
        <div style={{height:3,background:"rgba(0,0,0,.45)",borderRadius:2,marginTop:5}}>
          <div style={{width:`${(xp/(level*300))*100}%`,height:"100%",background:"linear-gradient(90deg,#0044ff,#00d4ff)",borderRadius:2,transition:"width .5s"}}/>
        </div>
      </div>

      {/* Day/night CTA */}
      <div style={{padding:"7px 13px 0"}}>
        {phase==="day"&&dives>=2&&(
          <button onClick={endDay} style={{width:"100%",padding:"9px 0",background:"linear-gradient(135deg,rgba(55,35,170,.4),rgba(22,10,100,.4))",border:"1px solid #5533dd",borderRadius:10,color:"#bbaaff",cursor:"pointer",fontSize:12,fontWeight:700}}>
            🌙 结束白天 → 开启夜间经营
          </button>
        )}
        {phase==="night"&&(
          <button onClick={endNight} style={{width:"100%",padding:"9px 0",background:"linear-gradient(135deg,rgba(180,120,0,.4),rgba(110,65,0,.4))",border:"1px solid #ffaa00",borderRadius:10,color:"#ffdd66",cursor:"pointer",fontSize:12,fontWeight:700}}>
            ☀️ 结束营业 → 新的一天（夜间¥{nightEarnings.toLocaleString()}·接待{nightServeCount}桌）
          </button>
        )}
      </div>

      {/* Tabs */}
      <div style={{display:"flex",borderBottom:"1px solid rgba(0,55,110,.3)",background:"rgba(0,5,14,.75)",overflowX:"auto"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,minWidth:44,padding:"9px 2px",fontSize:8.5,border:"none",background:tab===t.id?"rgba(0,100,180,.2)":"transparent",color:tab===t.id?"#00d4ff":"#1a3e58",borderBottom:tab===t.id?"2px solid #00d4ff":"2px solid transparent",cursor:"pointer",whiteSpace:"nowrap"}}>
            {t.label}
          </button>
        ))}
      </div>

      <div style={{padding:12}} className="tb">

        {/* ══ MAP ══ */}
        {tab==="map"&&(
          <div>
            <div style={{fontSize:10,color:"#1e4860",marginBottom:11}}>{phase==="day"?`☀️ 选择水域下潜（今日剩余 ${2-dives} 次）`:"🌙 夜晚无法下潜，请经营餐厅"}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:12}}>
              {Object.values(ZONES).map(z=>{
                const access=eq("suit").zones.includes(z.id);
                const sel=selZone===z.id;
                const fishHere=Object.values(FISH).filter(f=>f.z===z.id).length;
                const found=Object.keys(codex).filter(id=>FISH[id]?.z===z.id).length;
                return (
                  <button key={z.id} onClick={()=>access&&setSelZone(z.id)}
                    style={{padding:"10px 8px",background:sel?`${z.color}22`:"rgba(0,12,30,.65)",border:`2px solid ${sel?z.color:access?"#112233":"#0a0a0a"}`,borderRadius:12,color:access?z.color:"#1a1a1a",cursor:access?"pointer":"not-allowed",textAlign:"left",transition:"all .2s"}}>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <span style={{fontSize:22}}>{z.emoji}</span>
                      {!access&&<span style={{fontSize:9,color:"#222"}}>🔒</span>}
                    </div>
                    <div style={{fontSize:11,fontWeight:700,marginTop:3}}>{z.name}</div>
                    <div style={{fontSize:8,opacity:.7,marginTop:2}}>{found}/{fishHere}种已发现</div>
                  </button>
                );
              })}
            </div>
            {(()=>{
              const z=ZONES[selZone];
              const access=eq("suit").zones.includes(selZone);
              return (
                <div style={{background:`${z.color}12`,border:`1px solid ${z.color}33`,borderRadius:13,padding:13,marginBottom:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <span style={{fontSize:28}}>{z.emoji}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:15,fontWeight:700,color:z.color}}>{z.name}</div>
                      <div style={{fontSize:10,color:"#5a8a9a"}}>{z.desc}</div>
                    </div>
                    <div style={{fontSize:9,color:"#3a6a78",background:"rgba(0,0,0,.3)",borderRadius:7,padding:"4px 8px",textAlign:"center"}}>⛽¥{z.cost}</div>
                  </div>
                  {!access&&<div style={{color:"#ff6644",fontSize:11,marginBottom:8}}>🔒 需要更高级潜水服才能进入</div>}
                  <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
                    {Object.entries(FISH).filter(([,f])=>f.z===selZone).slice(0,10).map(([id,f])=>(
                      <div key={id} style={{background:"rgba(0,0,0,.3)",borderRadius:5,padding:"2px 7px",fontSize:10,border:`1px solid ${codex[id]?"#336633":"#1a3a4a"}`}}>
                        {f.e} {codex[id]?f.n:"???"}
                      </div>
                    ))}
                  </div>
                  <div style={{display:"flex",gap:7}}>
                    {z.depths.map(d=>{
                      const dLabel=d==="shallow"?"浅海":d==="mid"?"中层":"深海";
                      const depthLock=DEPTH_ORDER.indexOf(d)>DEPTH_ORDER.indexOf(eq("suit").maxD);
                      const locked=phase!=="day"||dives>=2||!access||depthLock;
                      const pool=getFish(selZone,d).filter(f=>f.v>0);
                      const maxV=pool.length?Math.max(...pool.map(f=>f.v)):0;
                      return (
                        <button key={d} onClick={()=>startDive(selZone,d)} disabled={locked}
                          style={{flex:1,padding:"11px 5px",background:locked?"rgba(15,15,15,.35)":`${z.color}22`,border:`1px solid ${locked?"#1a1a1a":z.color}55`,borderRadius:10,color:locked?"#2a2a2a":z.color,cursor:locked?"not-allowed":"pointer",fontSize:11,textAlign:"center"}}>
                          <div style={{fontWeight:700,marginBottom:3}}>{dLabel}</div>
                          <div style={{fontSize:9,opacity:.8}}>{depthLock?"🔒深度不足":phase==="night"?"🌙夜晚":dives>=2?"次数耗尽":!access?"🔒锁定":`最高¥${maxV.toLocaleString()}`}</div>
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })()}
            <div style={{background:"rgba(0,12,35,.55)",borderRadius:11,padding:11,border:"1px solid rgba(0,55,100,.3)"}}>
              <div style={{fontSize:10,color:"#3a6a8a",fontWeight:700,marginBottom:7}}>🔧 当前装备</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
                {[{t:"harpoon",i:"🔱"},{t:"gun",i:"🔫"},{t:"tank",i:"💧"},{t:"suit",i:"🤿"},{t:"cargo",i:"📦"}].map(({t,i})=>(
                  <div key={t} style={{background:"rgba(0,22,55,.42)",borderRadius:7,padding:"5px 9px",fontSize:9}}>
                    <span style={{color:"#1e4460"}}>{i} </span><span style={{color:"#88aacc"}}>{eq(t).name}</span>
                    {t==="gun"&&eq(t).id!=="g0"&&<span style={{color:"#ff8844",marginLeft:3}}>×{ammo}</span>}
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ══ RESTAURANT — Live Customer View ══ */}
        {tab==="restaurant"&&(
          <div>
            {/* Stats row */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
              <div style={{background:"rgba(0,30,60,.5)",borderRadius:10,padding:"9px 10px",border:"1px solid rgba(0,80,140,.3)",textAlign:"center"}}>
                <div style={{fontSize:9,color:"#3a6a88"}}>评分</div>
                <div style={{fontSize:18,fontWeight:700,color:"#ffd700"}}>⭐{rating.toFixed(1)}</div>
              </div>
              <div style={{background:"rgba(0,30,60,.5)",borderRadius:10,padding:"9px 10px",border:"1px solid rgba(0,80,140,.3)",textAlign:"center"}}>
                <div style={{fontSize:9,color:"#3a6a88"}}>声誉</div>
                <div style={{fontSize:18,fontWeight:700,color:reputation>60?"#44ff88":reputation>30?"#ffcc44":"#ff6644"}}>{reputation}</div>
              </div>
              <div style={{background:"rgba(0,30,60,.5)",borderRadius:10,padding:"9px 10px",border:"1px solid rgba(0,80,140,.3)",textAlign:"center"}}>
                <div style={{fontSize:9,color:"#3a6a88"}}>今夜营收</div>
                <div style={{fontSize:14,fontWeight:700,color:"#44ff88"}}>¥{nightEarnings.toLocaleString()}</div>
              </div>
            </div>

            {/* Restaurant XP bar */}
            <div style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#3a6a88",marginBottom:3}}>
                <span>餐厅经验 {restLv}★</span><span>{Math.floor(restXp)}/{restLv*1000}</span>
              </div>
              <div style={{height:5,background:"rgba(0,0,0,.4)",borderRadius:3}}>
                <div style={{width:`${(restXp/(restLv*1000))*100}%`,height:"100%",background:"linear-gradient(90deg,#ff6b35,#ffd700)",borderRadius:3}}/>
              </div>
            </div>

            {phase!=="night"&&<div style={{background:"rgba(45,22,0,.42)",border:"1px solid #774400",borderRadius:9,padding:"9px 12px",marginBottom:11,fontSize:11,color:"#ffbb44"}}>⚠️ 餐厅仅夜晚营业！白天潜水捕鱼积累食材。</div>}

            {/* Active customers table */}
            {phase==="night"&&(
              <div style={{marginBottom:12}}>
                <div style={{fontSize:11,color:"#4a7a8a",fontWeight:700,marginBottom:8}}>
                  🪑 当前桌台（{customers.filter(c=>c.status==="waiting"||c.status==="eating").length}/{tableCount+(hasU("r4")?2:0)}满）
                </div>
                {customers.filter(c=>c.status==="waiting"||c.status==="eating").length===0&&(
                  <div style={{textAlign:"center",color:"#1a3a58",padding:"14px 0",fontSize:13}}>等待客人到来…</div>
                )}
                {customers.filter(c=>c.status==="waiting"||c.status==="eating").map(c=>{
                  const now=Date.now();
                  const patience=Math.max(0,c.patienceEnd-now);
                  const patiencePct=patience/c.patienceMs*100;
                  const cooking=cookQueue.find(q=>q.custUid===c.uid);
                  return (
                    <div key={c.uid} style={{background:"rgba(0,25,55,.6)",border:`1px solid ${c.status==="eating"?"rgba(0,180,80,.4)":"rgba(0,80,140,.3)"}`,borderRadius:12,padding:"11px 12px",marginBottom:8,animation:"walkIn .4s ease"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <span style={{fontSize:22}}>{c.customerEmoji}</span>
                          <div>
                            <div style={{fontSize:12,fontWeight:700}}>{c.name}</div>
                            <div style={{fontSize:9,color:"#3a6a88"}}>
                              {c.status==="eating"?"🍽️ 用餐中":cooking?"👨‍🍳 烹饪中":"😐 等待点菜"}
                              {" · 预算¥"}{Math.floor((c.bill||0)*c.spendMult)||"?"}
                            </div>
                          </div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          {c.status==="eating"&&<div style={{fontSize:10,color:"#44cc88"}}>✅ 已上菜</div>}
                          {cooking&&<div style={{fontSize:9,color:"#ffcc44"}}>⏳{Math.max(0,Math.floor((cooking.finishAt-Date.now())/1000))}s</div>}
                        </div>
                      </div>
                      {/* patience bar */}
                      {c.status!=="eating"&&<div style={{marginBottom:7}}>
                        <div style={{fontSize:8,color:patiencePct<30?"#ff8888":"#3a6a88",marginBottom:2}}>
                          ⏰ {patiencePct<30?"快不耐烦了！":"耐心值"} {Math.floor(patience/1000)}s
                        </div>
                        <div style={{height:4,background:"rgba(0,0,0,.4)",borderRadius:2}}>
                          <div style={{width:`${patiencePct}%`,height:"100%",background:patiencePct<30?"#ff4444":"#00aaff",borderRadius:2,transition:"width .5s"}}/>
                        </div>
                      </div>}
                      {/* dish selection — only show if waiting and not already cooking */}
                      {c.status==="waiting"&&!cooking&&(
                        <div>

                        <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>{festivalMenu.name}</div>
                        <div style={{fontSize:9,color:"#ccaa44"}}>{festivalMenu.desc}</div>
                        <div style={{fontSize:9,color:"#88aacc",marginTop:2}}>需要：{FISH[festivalMenu.fish]?.e}{FISH[festivalMenu.fish]?.n}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:18,fontWeight:700,color:"#ffd700"}}>¥{festivalMenu.price}</div>
                        {(inv[festivalMenu.fish]||0)>0?<div style={{fontSize:9,color:"#44cc88"}}>✅ 有食材</div>:<div style={{fontSize:9,color:"#ff6644"}}>❌ 需要捕鱼</div>}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            ):(
              <div style={{background:"rgba(0,15,40,.5)",border:"1px solid rgba(0,55,110,.3)",borderRadius:12,padding:12,marginBottom:14,textAlign:"center",color:"#2a5a78",fontSize:12}}>
                今天没有节日，照常作业
              </div>
            )}

            {/* Month calendar grid */}
            <div style={{background:"rgba(0,12,30,.6)",borderRadius:14,padding:13,marginBottom:14,border:"1px solid rgba(0,55,110,.3)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontSize:12,fontWeight:700,color:"#4a8aaa"}}>📅 本月日历（第{Math.ceil(day/30)}月）</div>
                <div style={{fontSize:10,color:"#3a6a88"}}>今天：{monthDay}号</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:3}}>
                {Array.from({length:30},(_,i)=>{
                  const d=i+1;
                  const fest=FESTIVALS[d];
                  const isCur=d===monthDay;
                  const isPast=d<monthDay;
                  return (
                    <div key={d} style={{
                      background:isCur?`${curSeason.color}33`:fest?"rgba(255,215,0,.1)":"rgba(0,0,0,.3)",
                      border:`1px solid ${isCur?curSeason.color:fest?"#ffd70066":"#0d1a2a"}`,
                      borderRadius:6,padding:"5px 2px",textAlign:"center",opacity:isPast?.5:1,
                      position:"relative"
                    }}>
                      {fest&&<div style={{fontSize:8,lineHeight:1}}>{fest.emoji}</div>}
                      <div style={{fontSize:10,fontWeight:isCur?700:400,color:isCur?curSeason.color:fest?"#ffd700":"#4a7a9a"}}>{d}</div>
                      {isCur&&<div style={{width:4,height:4,background:curSeason.color,borderRadius:"50%",margin:"1px auto 0"}}/>}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Upcoming festivals */}
            <div style={{background:"rgba(0,12,30,.6)",borderRadius:14,padding:13,border:"1px solid rgba(0,55,110,.3)"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#4a8aaa",marginBottom:10}}>🔜 即将到来的节日</div>
              {upcoming.map(({daysLeft,day:fDay,festival:f})=>(
                <div key={fDay} style={{display:"flex",alignItems:"center",gap:10,background:`${f.color}0d`,border:`1px solid ${f.color}33`,borderRadius:10,padding:"10px 12px",marginBottom:7}}>
                  <span style={{fontSize:24}}>{f.emoji}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:700,color:f.color}}>{f.name}</div>
                    <div style={{fontSize:9,color:"#5a8a9a",lineHeight:1.4}}>{f.desc.slice(0,40)}…</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:11,color:"#ffd700",fontWeight:700}}>{daysLeft}天后</div>
                    <div style={{fontSize:8,color:"#3a6a88"}}>{fDay}号</div>
                  </div>
                </div>
              ))}
            </div>

            {/* Season bonus fish */}
            <div style={{marginTop:14,background:"rgba(0,12,30,.6)",borderRadius:12,padding:12,border:`1px solid ${curSeason.color}22`}}>
              <div style={{fontSize:11,fontWeight:700,color:curSeason.color,marginBottom:8}}>{curSeason.emoji} {curSeason.name}特产鱼类（出现率提升）</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {curSeason.spawnBonus.map(id=>{
                  const f=FISH[id];
                  return f?(
                    <div key={id} style={{background:"rgba(0,0,0,.3)",borderRadius:7,padding:"5px 9px",fontSize:10,border:`1px solid ${curSeason.color}33`,display:"flex",alignItems:"center",gap:4}}>
                      <span>{f.e}</span><span style={{color:"#aaccee"}}>{f.n}</span>
                      {codex[id]&&<span style={{fontSize:8,color:"#44cc88"}}>✓</span>}
                    </div>
                  ):null;
                })}
              </div>
            </div>
          </div>
        )}

        {/* ══ CODEX ══ */}
        {tab==="codex"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontSize:12,fontWeight:700,color:"#4a7a8a"}}>📖 海洋图鉴</div>
              <div style={{fontSize:11,color:"#ffd700"}}>{codexCount}/{Object.keys(FISH).length}</div>
            </div>
            <div style={{height:4,background:"rgba(0,0,0,.4)",borderRadius:2,marginBottom:12}}>
              <div style={{width:`${(codexCount/Object.keys(FISH).length)*100}%`,height:"100%",background:"linear-gradient(90deg,#ffd700,#ffaa00)",borderRadius:2}}/>
            </div>
            {Object.entries(ZONES).map(([zid,z])=>(
              <div key={zid} style={{marginBottom:12}}>
                <div style={{fontSize:10,fontWeight:700,color:z.color,marginBottom:5,paddingBottom:3,borderBottom:`1px solid ${z.color}33`}}>
                  {z.emoji} {z.name} · {Object.keys(codex).filter(id=>FISH[id]?.z===zid).length}/{Object.values(FISH).filter(f=>f.z===zid).length}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
                  {Object.entries(FISH).filter(([,f])=>f.z===zid).map(([id,f])=>{
                    const found=!!codex[id];const cnt=codex[id]||0;
                    return (
                      <div key={id} style={{background:found?"rgba(0,20,50,.65)":"rgba(6,6,6,.5)",border:`1px solid ${found?z.color+"33":"#0d0d0d"}`,borderRadius:8,padding:"7px 8px",opacity:found?1:.4}}>
                        <div style={{display:"flex",alignItems:"center",gap:5}}>
                          <span style={{fontSize:20,filter:found?"none":"grayscale(1) opacity(.3)"}}>{found?f.e:"❓"}</span>
                          <div>
                            <div style={{fontSize:10,fontWeight:700,color:found?"#aaccee":"#1a2a3a"}}>{found?f.n:"未发现"}</div>
                            {found&&<div style={{fontSize:8,color:"#2a5a78"}}>×{cnt} · ¥{f.v}{f.prot?" · 🛡":""}{f.rare?" · ★":""}</div>}
                            {found&&<div style={{fontSize:8,color:"#2a5a78"}}>{starStr(f.q)} 品质</div>}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ══ AI ══ */}
        {tab==="ai"&&(
          <div>
            <div style={{background:"linear-gradient(135deg,rgba(0,55,120,.3),rgba(0,28,75,.3))",borderRadius:12,padding:12,marginBottom:11,border:"1px solid rgba(0,110,190,.28)"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#00d4ff",marginBottom:3}}>🤖 AI潜水顾问 · 料理大师</div>
              <div style={{fontSize:10,color:"#4a7a8a",lineHeight:1.7}}>知晓全部状态。问我：水域选择·菜品搭配·装备升级·客人管理·图鉴攻略…</div>
            </div>
            <div style={{maxHeight:260,overflowY:"auto",marginBottom:10}}>
              {aiHist.map((m,i)=>(
                <div key={i} style={{background:m.role==="user"?"rgba(0,50,110,.4)":"rgba(0,28,14,.4)",border:`1px solid ${m.role==="user"?"rgba(0,80,160,.3)":"rgba(0,110,50,.3)"}`,borderRadius:9,padding:"9px 12px",marginBottom:6}}>
                  <div style={{fontSize:9,color:m.role==="user"?"#2a7a9a":"#27994d",marginBottom:2}}>{m.role==="user"?"👤 你":"🤖 AI顾问"}</div>
                  <div style={{fontSize:12,lineHeight:1.65,color:"#aacce8"}}>{m.content}</div>
                </div>
              ))}
              {aiLoad&&<div style={{textAlign:"center",padding:12,color:"#1e4460",animation:"pulse 1s infinite"}}>🤖 思考中…</div>}
            </div>
            <div style={{display:"flex",gap:7,marginBottom:9}}>
              <input value={aiIn} onChange={e=>setAiIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&askAi()} placeholder="问问AI顾问…" style={{flex:1,padding:"10px 12px",fontSize:12,background:"rgba(0,15,40,.7)",border:"1px solid rgba(0,60,120,.4)",borderRadius:9,color:"#aacce8",outline:"none"}}/>
              <button onClick={askAi} disabled={aiLoad} style={{padding:"10px 14px",background:"rgba(0,100,180,.38)",border:"1px solid #0044cc",borderRadius:9,color:"#00ccff",cursor:"pointer",fontSize:12}}>发送</button>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {["去哪潜水最值？","最赚钱菜品？","装备升级顺序？","怎么提升评分？","BOSS怎么打？","图鉴怎么集齐？"].map(q=>(
                <button key={q} onClick={()=>setAiIn(q)} style={{padding:"5px 9px",fontSize:9,background:"rgba(0,22,65,.42)",border:"1px solid rgba(0,50,110,.3)",borderRadius:15,color:"#4a7a8a",cursor:"pointer"}}>{q}</button>
              ))}
            </div>
          </div>
        )}

      </div>

      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,maxWidth:520,margin:"0 auto",background:"rgba(0,5,14,.98)",borderTop:"1px solid rgba(0,45,90,.4)",display:"flex"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 0",fontSize:8,border:"none",background:tab===t.id?"rgba(0,100,180,.14)":"transparent",color:tab===t.id?"#00d4ff":"#1a3a55",cursor:"pointer"}}>
            {t.label}
          </button>
        ))}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(DeepCatch));
</script>
</body>
</html>
