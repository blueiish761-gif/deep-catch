<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>深海捕手 Deep Catch</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans SC",sans-serif;background:#000c18;overscroll-behavior:none}
#root{max-width:520px;margin:0 auto;min-height:100vh}
input,button,select{font-family:inherit}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#004477;border-radius:2px}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-13px)}}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 12px #00aaff)}50%{filter:drop-shadow(0 0 36px #00d4ff)}}
@keyframes bub{0%{transform:translateY(0);opacity:.35}100%{transform:translateY(-110vh);opacity:0}}
@keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes pop{0%{transform:scale(.82);opacity:0}65%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes walkIn{from{transform:translateX(120px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes walkOut{from{transform:translateX(0);opacity:1}to{transform:translateX(-120px);opacity:0}}
@keyframes hunger{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* ── 潜水动画 ── */
@keyframes swimL{0%,100%{transform:translateX(0) scaleX(1) translateY(0)}30%{transform:translateX(14px) scaleX(-1) translateY(-4px)}60%{transform:translateX(8px) scaleX(-1) translateY(2px)}80%{transform:translateX(-4px) scaleX(1) translateY(-2px)}}
@keyframes swimS{0%,100%{transform:translateX(0) scaleX(1)}50%{transform:translateX(6px) scaleX(-1)}}
@keyframes swimU{0%{transform:translateY(0) scaleX(1)}25%{transform:translateY(-6px) scaleX(1)}50%{transform:translateY(0) scaleX(-1)}75%{transform:translateY(4px) scaleX(-1)}}
@keyframes swimWave{0%,100%{transform:translateX(0) translateY(0) rotate(0)}25%{transform:translateX(10px) translateY(-5px) rotate(5deg)}50%{transform:translateX(20px) translateY(0) rotate(0)}75%{transform:translateX(10px) translateY(5px) rotate(-5deg)}}
@keyframes swimBoss{0%,100%{transform:translateX(0) scaleX(1) scale(1)}20%{transform:translateX(18px) scaleX(-1) scale(1.05)}40%{transform:translateX(12px) scaleX(-1) scale(0.98)}60%{transform:translateX(5px) scaleX(1) scale(1.02)}80%{transform:translateX(-8px) scaleX(1) scale(0.97)}}
@keyframes float{0%,100%{transform:translateY(0) rotate(0)}33%{transform:translateY(-4px) rotate(3deg)}66%{transform:translateY(3px) rotate(-2deg)}}
@keyframes sway{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
@keyframes snapClaw{0%,100%{transform:rotate(0)}30%{transform:rotate(-20deg)}60%{transform:rotate(10deg)}}
@keyframes jellyPulse{0%,100%{transform:scaleY(1) scaleX(1)}50%{transform:scaleY(.7) scaleX(1.2)}}
@keyframes sharkCircle{0%{transform:translateX(0) scaleX(1)}25%{transform:translateX(16px) scaleX(1)}50%{transform:translateX(16px) scaleX(-1)}75%{transform:translateX(0) scaleX(-1)}}
@keyframes bossRoar{0%,100%{transform:scale(1) rotate(0)}10%{transform:scale(1.15) rotate(-3deg)}20%{transform:scale(1.1) rotate(3deg)}30%{transform:scale(1.12) rotate(-2deg)}50%{transform:scale(1)}}
@keyframes sneak{0%,100%{opacity:.4;transform:scaleX(1)}45%{opacity:1;transform:scaleX(-1) translateX(8px)}50%{opacity:.1}55%{opacity:.8;transform:scaleX(1) translateX(0)}}
@keyframes tentacle{0%,100%{transform:rotate(0) scaleY(1)}25%{transform:rotate(15deg) scaleY(1.1)}50%{transform:rotate(-10deg) scaleY(.9)}75%{transform:rotate(20deg) scaleY(1.05)}}
@keyframes harpoonFly{0%{transform:translateX(0) rotate(0);opacity:1}100%{transform:translateX(60px) rotate(15deg);opacity:0}}
@keyframes bulletFly{0%{transform:translateX(0);opacity:1}100%{transform:translateX(80px);opacity:0}}
@keyframes hitFlash{0%,100%{background:transparent}20%{background:rgba(255,50,50,.6)}60%{background:rgba(255,100,0,.3)}}
@keyframes caughtStar{0%{transform:scale(0) rotate(0);opacity:1}100%{transform:scale(2.5) rotate(180deg);opacity:0}}
@keyframes escaped{0%{transform:translateX(0);opacity:1}100%{transform:translateX(80px);opacity:0}}
@keyframes ripple{0%{transform:scale(0);opacity:.8}100%{transform:scale(3);opacity:0}}
@keyframes depthScan{0%{background-position:0 0}100%{background-position:0 100px}}
@keyframes sonarPing{0%{transform:scale(0.5);opacity:1}100%{transform:scale(3);opacity:0}}
@keyframes waterWave{0%,100%{transform:translateX(0) scaleY(1)}50%{transform:translateX(-8px) scaleY(1.1)}}
@keyframes bubbleUp{0%{transform:translateY(0) scale(1);opacity:.6}100%{transform:translateY(-60px) scale(1.5);opacity:0}}
@keyframes critHit{0%{transform:scale(1);color:#fff}30%{transform:scale(1.8);color:#ff4400}70%{transform:scale(1.4);color:#ffaa00}100%{transform:scale(1)}}
@keyframes xpFloat{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-40px);opacity:0}}
@keyframes scanLine{0%{top:0}100%{top:100%}}
@keyframes borderGlow{0%,100%{box-shadow:0 0 4px rgba(255,80,0,.4)}50%{box-shadow:0 0 18px rgba(255,80,0,.9),inset 0 0 8px rgba(255,50,0,.2)}}
@keyframes greenBorder{0%,100%{box-shadow:0 0 4px rgba(0,200,80,.4)}50%{box-shadow:0 0 16px rgba(0,220,100,.8),inset 0 0 6px rgba(0,180,70,.2)}}
@keyframes diveIn{0%{transform:translateY(-30px) scale(.9);opacity:0}100%{transform:translateY(0) scale(1);opacity:1}}
@keyframes cardAppear{0%{transform:scale(.85) translateY(12px);opacity:0}60%{transform:scale(1.03) translateY(-2px)}100%{transform:scale(1) translateY(0);opacity:1}}

.tb{animation:slideUp .2s ease}
button:active{transform:scale(.93)}
.dive-card{animation:cardAppear .35s cubic-bezier(.34,1.56,.64,1) both}
.dive-screen{animation:diveIn .4s ease both}
</style>
</head>
<body>
<div id="root">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#000c18;color:#8ecfff;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans SC',sans-serif;text-align:center;line-height:1.7">
    <div>
      <div style="font-size:42px;margin-bottom:10px">🤿</div>
      <div style="font-weight:700;margin-bottom:6px">深海捕手正在加载...</div>
      <div style="font-size:12px;color:#4a8aaa">如果一直停在这里，请确认 vendor 目录里的 React 和 Babel 文件已经一起上传。</div>
    </div>
  </div>
</div>
<script src="./vendor/react.production.min.js"></script>
<script src="./vendor/react-dom.production.min.js"></script>
<script src="./app.js"></script>
</body>
</html>
